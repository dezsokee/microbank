name: Go CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
env:
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Resolve modules
        working-directory: ${{ inputs.service_path }}
        run: go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ inputs.service_path }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Resolve modules
        working-directory: ${{ inputs.service_path }}
        run: go mod tidy

      - name: Run tests
        working-directory: ${{ inputs.service_path }}
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/coverage.out

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        working-directory: ${{ inputs.service_path }}
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ github.repository_owner }}/microbank-${{ inputs.service_name }}:${{ github.sha }}
          IMAGE_LATEST: ${{ env.REGISTRY }}/${{ github.repository_owner }}/microbank-${{ inputs.service_name }}:latest
        run: |
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
