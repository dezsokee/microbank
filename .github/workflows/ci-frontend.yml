name: CI — Frontend

on:
  push:
    paths: [services/frontend/**, .github/workflows/reusable-react.yml, .github/workflows/ci-frontend.yml]
  pull_request:
    branches: [main]
    paths: [services/frontend/**, .github/workflows/reusable-react.yml, .github/workflows/ci-frontend.yml]

jobs:
  ci:
    uses: ./.github/workflows/reusable-react.yml
    with:
      service_name: frontend
      service_path: services/frontend
