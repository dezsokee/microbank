name: Python CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        working-directory: ${{ inputs.service_path }}
        run: ruff check .

      - name: Run ruff format check
        working-directory: ${{ inputs.service_path }}
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ inputs.service_path }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        working-directory: ${{ inputs.service_path }}
        run: pytest -v --cov=. --cov-report=xml || test $? -eq 5

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/coverage.xml

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          BRANCH_TAG=$(echo "$BRANCH" | tr '/_' '--' | tr -cd 'a-zA-Z0-9.-')
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/microbank-${{ inputs.service_name }}"
          TAGS="$IMG:${{ github.sha }},$IMG:branch-$BRANCH_TAG"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="$TAGS,$IMG:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.service_path }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
