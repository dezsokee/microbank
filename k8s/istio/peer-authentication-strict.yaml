apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: microbank-mtls-strict
  namespace: student-research
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: microbank-api-gateway-ingress
  namespace: student-research
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  mtls:
    mode: STRICT
  portLevelMtls:
    "8080":
      mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: microbank-frontend-ingress
  namespace: student-research
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  mtls:
    mode: STRICT
  portLevelMtls:
    "80":
      mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: monitoring-grafana-ingress
  namespace: student-research
spec:
  selector:
    matchLabels:
      app: grafana
  mtls:
    mode: STRICT
  portLevelMtls:
    "3000":
      mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: monitoring-prometheus-ingress
  namespace: student-research
spec:
  selector:
    matchLabels:
      app: prometheus
  mtls:
    mode: STRICT
  portLevelMtls:
    "9090":
      mode: PERMISSIVE
