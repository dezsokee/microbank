apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-grafana-dashboards
  labels:
    app: grafana
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  microbank-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Service Health Overview",
          "type": "stat",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(up{job!=\"prometheus\"} == 1)",
              "legendFormat": "Healthy"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "green", "value": 8 }
                ]
              },
              "unit": "none",
              "displayName": "Services Up"
            }
          }
        },
        {
          "title": "Request Rate by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_requests_total{job!=\"prometheus\"}[5m]))",
              "legendFormat": "{{`{{service}}`}}"
            },
            {
              "expr": "sum by (service) (rate(http_server_requests_seconds_count{job!=\"prometheus\"}[5m]))",
              "legendFormat": "{{`{{service}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Error Rate by Service (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_requests_total{job!=\"prometheus\", code=~\"5..\"}[5m]))",
              "legendFormat": "{{`{{service}}`}}"
            },
            {
              "expr": "sum by (service) (rate(http_server_requests_seconds_count{job!=\"prometheus\", status=~\"5..\"}[5m]))",
              "legendFormat": "{{`{{service}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 },
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "title": "P50 Latency by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (service, le) (rate(http_request_duration_seconds_bucket{job!=\"prometheus\"}[5m])))",
              "legendFormat": "{{`{{service}}`}}"
            },
            {
              "expr": "histogram_quantile(0.50, sum by (service, le) (rate(http_server_requests_seconds_bucket{job!=\"prometheus\"}[5m])))",
              "legendFormat": "{{`{{service}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "P99 Latency by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (service, le) (rate(http_request_duration_seconds_bucket{job!=\"prometheus\"}[5m])))",
              "legendFormat": "{{`{{service}}`}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (service, le) (rate(http_server_requests_seconds_bucket{job!=\"prometheus\"}[5m])))",
              "legendFormat": "{{`{{service}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "CPU Usage by Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(process_cpu_seconds_total{job!=\"prometheus\"}[5m]))",
              "legendFormat": "{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Memory Usage by Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "expr": "sum by (pod) (process_resident_memory_bytes{job!=\"prometheus\"})",
              "legendFormat": "{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Request Rate per Endpoint (API Gateway)",
          "type": "table",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "targets": [
            {
              "expr": "sum by (method, path) (rate(http_requests_total{service=~\".*api-gateway.*\"}[5m]))",
              "format": "table",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["microbank", "overview"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "MicroBank Overview",
      "uid": "microbank-overview"
    }
