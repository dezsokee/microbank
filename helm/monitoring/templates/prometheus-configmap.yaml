apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-prometheus-config
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape Prometheus itself
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # Go services
      - job_name: "api-gateway"
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ .Release.Name }}-api-gateway:8080"]
            labels:
              service: api-gateway

      - job_name: "auth-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ .Release.Name }}-auth-service:8081"]
            labels:
              service: auth-service

      - job_name: "fraud-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ .Release.Name }}-fraud-service:8084"]
            labels:
              service: fraud-service

      # Spring Boot services (Kotlin/Java)
      - job_name: "account-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["{{ .Release.Name }}-account-service:8082"]
            labels:
              service: account-service

      - job_name: "transaction-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["{{ .Release.Name }}-transaction-service:8083"]
            labels:
              service: transaction-service

      - job_name: "audit-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["{{ .Release.Name }}-audit-service:8087"]
            labels:
              service: audit-service

      # Python services
      - job_name: "exchange-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ .Release.Name }}-exchange-service:8085"]
            labels:
              service: exchange-service

      - job_name: "notification-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ .Release.Name }}-notification-service:8086"]
            labels:
              service: notification-service
