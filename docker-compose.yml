services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: microbank
      POSTGRES_PASSWORD: microbank
      POSTGRES_DB: microbank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microbank"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: microbank
      DB_PASSWORD: microbank
      DB_NAME: auth_db
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  account-service:
    build: ./services/account-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: microbank
      DB_PASSWORD: microbank
      DB_NAME: account_db
      PORT: "8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  fraud-service:
    build: ./services/fraud-service
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  exchange-service:
    build: ./services/exchange-service
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  notification-service:
    build: ./services/notification-service
    ports:
      - "8086:8086"
    environment:
      PORT: "8086"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8086/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  audit-service:
    build: ./services/audit-service
    ports:
      - "8087:8087"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: microbank
      DB_PASSWORD: microbank
      DB_NAME: audit_db
      PORT: "8087"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8087/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  transaction-service:
    build: ./services/transaction-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: microbank
      DB_PASSWORD: microbank
      DB_NAME: transaction_db
      ACCOUNT_SERVICE_URL: http://account-service:8082
      FRAUD_SERVICE_URL: http://fraud-service:8084
      EXCHANGE_SERVICE_URL: http://exchange-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      AUDIT_SERVICE_URL: http://audit-service:8087
      PORT: "8083"
    depends_on:
      account-service:
        condition: service_healthy
      fraud-service:
        condition: service_healthy
      exchange-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      TRANSACTION_SERVICE_URL: http://transaction-service:8083
      EXCHANGE_SERVICE_URL: http://exchange-service:8085
      PORT: "8080"
    depends_on:
      auth-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./services/frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
